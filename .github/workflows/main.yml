name: Routiny Smart Workflow
on: [push]

permissions:
  contents: write

jobs:
  # وظيفة الويب: تعمل دائماً وبسرعة
  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter build web --release --base-href "/${{ github.event.repository.name }}/"
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages

  # وظيفة الـ APK: لن تظهر أبداً ولن تبدأ إلا بكلمة build
  build-apk:
    if: contains(github.event.head_commit.message, 'build') || contains(github.event.head_commit.message, 'Build')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Routiny-App-Release
          path: build/app/outputs/flutter-apk/app-release.apk
