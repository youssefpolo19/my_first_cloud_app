name: RoutinyManager
description: RoutinyManager By Youssef
publish_to: 'none'
version: 1.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # المكتبات الاحترافية التي طلبتها
  shared_preferences: ^2.2.2       # للحفظ المحلي (Local Storage)
  flutter_local_notifications: ^16.3.2 # للنظام الإشعارات
  flutter_svg: ^2.0.9              # للأيقونات الاحترافية SVG

flutter:
  uses-material-3: true
  # إعداد الخط المميز (SF Pro) - يجب تحميل الملف ووضعه في مجلد fonts
  fonts:
    - family: SF Pro
      fonts:
        - asset: fonts/SF-Pro-Display-Regular.otf
        - asset: fonts/SF-Pro-Display-Bold.otf
          weight: 700

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true